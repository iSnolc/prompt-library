<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>提示词库</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            padding: 20px;
        }
        
        .container {
            max-width: 1200px;
            margin: 0 auto;
        }
        
        .header {
            text-align: center;
            color: white;
            margin-bottom: 40px;
        }
        
        .header h1 {
            font-size: 2.5em;
            margin-bottom: 10px;
        }
        
        .header p {
            font-size: 1.1em;
            opacity: 0.9;
        }
        
        .filter-section {
            background: white;
            padding: 20px;
            border-radius: 10px;
            margin-bottom: 30px;
            box-shadow: 0 4px 6px rgba(0,0,0,0.1);
        }
        
        .filter-label {
            display: block;
            margin-bottom: 10px;
            font-weight: 600;
            color: #333;
        }
        
        .tag-buttons {
            display: flex;
            flex-wrap: wrap;
            gap: 10px;
        }
        
        .tag-btn {
            padding: 8px 16px;
            border: 2px solid #667eea;
            background: white;
            color: #667eea;
            border-radius: 20px;
            cursor: pointer;
            transition: all 0.3s;
            font-size: 0.95em;
        }
        
        .tag-btn:hover {
            background: #667eea;
            color: white;
        }
        
        .tag-btn.active {
            background: #667eea;
            color: white;
        }
        
        .search-box {
            width: 100%;
            padding: 12px;
            margin-top: 15px;
            border: 2px solid #ddd;
            border-radius: 8px;
            font-size: 1em;
        }
        
        .search-box:focus {
            outline: none;
            border-color: #667eea;
        }
        
        .prompts-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(350px, 1fr));
            gap: 20px;
        }
        
        .prompt-card {
            background: white;
            padding: 20px;
            border-radius: 10px;
            box-shadow: 0 4px 6px rgba(0,0,0,0.1);
            transition: all 0.3s;
            display: flex;
            flex-direction: column;
        }
        
        .prompt-card:hover {
            transform: translateY(-5px);
            box-shadow: 0 8px 12px rgba(0,0,0,0.2);
        }
        
        .prompt-title {
            font-size: 1.2em;
            font-weight: 600;
            color: #333;
            margin-bottom: 10px;
        }
        
        .prompt-tags {
            display: flex;
            flex-wrap: wrap;
            gap: 8px;
            margin-bottom: 12px;
        }
        
        .prompt-tag {
            display: inline-block;
            background: #f0f0f0;
            color: #666;
            padding: 4px 10px;
            border-radius: 12px;
            font-size: 0.85em;
        }
        
        .prompt-preview {
            color: #666;
            font-size: 0.95em;
            line-height: 1.5;
            margin-bottom: 15px;
            flex-grow: 1;
            overflow: hidden;
            display: -webkit-box;
            -webkit-line-clamp: 3;
            -webkit-box-orient: vertical;
        }
        
        .prompt-actions {
            display: flex;
            gap: 10px;
        }
        
        .copy-btn {
            flex: 1;
            padding: 10px;
            background: #667eea;
            color: white;
            border: none;
            border-radius: 6px;
            cursor: pointer;
            font-weight: 600;
            transition: all 0.3s;
        }
        
        .copy-btn:hover {
            background: #5568d3;
        }
        
        .copy-btn.copied {
            background: #48bb78;
        }
        
        .view-btn {
            flex: 1;
            padding: 10px;
            background: #f0f0f0;
            color: #333;
            border: none;
            border-radius: 6px;
            cursor: pointer;
            font-weight: 600;
            transition: all 0.3s;
        }
        
        .view-btn:hover {
            background: #e0e0e0;
        }
        
        .empty-state {
            text-align: center;
            color: white;
            padding: 40px;
        }
        
        .empty-state p {
            font-size: 1.1em;
        }
        
        .modal {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: rgba(0,0,0,0.5);
            z-index: 1000;
            align-items: center;
            justify-content: center;
        }
        
        .modal.active {
            display: flex;
        }
        
        .modal-content {
            background: white;
            padding: 30px;
            border-radius: 10px;
            max-width: 600px;
            max-height: 80vh;
            overflow-y: auto;
            width: 90%;
        }
        
        .modal-header {
            font-size: 1.5em;
            font-weight: 600;
            margin-bottom: 15px;
            color: #333;
        }
        
        .modal-body {
            color: #666;
            line-height: 1.6;
            margin-bottom: 20px;
            white-space: pre-wrap;
            word-break: break-word;
        }
        
        .modal-footer {
            display: flex;
            gap: 10px;
        }
        
        .modal-copy-btn {
            flex: 1;
            padding: 12px;
            background: #667eea;
            color: white;
            border: none;
            border-radius: 6px;
            cursor: pointer;
            font-weight: 600;
        }
        
        .modal-close-btn {
            flex: 1;
            padding: 12px;
            background: #f0f0f0;
            color: #333;
            border: none;
            border-radius: 6px;
            cursor: pointer;
            font-weight: 600;
        }
        
        .toast {
            position: fixed;
            bottom: 20px;
            right: 20px;
            background: #48bb78;
            color: white;
            padding: 15px 20px;
            border-radius: 6px;
            z-index: 2000;
            animation: slideIn 0.3s ease-out;
        }
        
        @keyframes slideIn {
            from {
                transform: translateX(400px);
                opacity: 0;
            }
            to {
                transform: translateX(0);
                opacity: 1;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>✨ 提示词库</h1>
            <p>精选高效提示词，一键复制即用</p>
        </div>
        
        <div class="filter-section">
            <label class="filter-label">📁 分类筛选</label>
            <div class="tag-buttons" id="tagButtons"></div>
            
            <input 
                type="text" 
                class="search-box" 
                id="searchInput" 
                placeholder="🔍 搜索提示词名称或内容..."
            >
        </div>
        
        <div class="prompts-grid" id="promptsGrid"></div>
        
        <div class="empty-state" id="emptyState" style="display:none;">
            <p>暂无匹配的提示词</p>
        </div>
    </div>
    
    <!-- 详情弹窗 -->
    <div class="modal" id="detailModal">
        <div class="modal-content">
            <div class="modal-header" id="modalTitle"></div>
            <div class="modal-body" id="modalBody"></div>
            <div class="modal-footer">
                <button class="modal-copy-btn" id="modalCopyBtn">📋 复制全文</button>
                <button class="modal-close-btn" id="modalCloseBtn">关闭</button>
            </div>
        </div>
    </div>
    
    <script>
        // 提示词数据（本地存储，可改为API调用）
        const promptsData = [
            {
                id: 1,
                title: "AI写作助手",
                tags: ["写作", "AI"],
                preview: "请帮我用以下风格改进这段文字：简洁、专业、引人入胜...",
                content: "请帮我用以下风格改进这段文字：\n\n风格要求：\n1. 简洁明了\n2. 专业但不生硬\n3. 引人入胜\n4. 易于理解\n\n请提供改进版本并说明改进之处。"
            },
            {
                id: 2,
                title: "代码审查专家",
                tags: ["代码", "审查"],
                preview: "请审查以下代码，指出问题并提供改进建议...",
                content: "请您作为一名资深代码审查员，审查以下代码：\n\n审查重点：\n1. 代码质量和可读性\n2. 潜在的性能问题\n3. 安全隐患\n4. 最佳实践\n5. 可维护性\n\n请提供详细的改进建议。"
            },
            {
                id: 3,
                title: "产品文案撰写",
                tags: ["营销", "文案"],
                preview: "为我的产品写一个引人注目的营销文案...",
                content: "请为我的产品写一个吸引人的营销文案。\n\n产品信息：\n- 产品名称：\n- 主要特点：\n- 目标用户：\n- 核心价值：\n\n文案要求：\n1. 突出产品优势\n2. 触发用户需求\n3. 包含行动号召\n4. 字数在100-200字"
            },
            {
                id: 4,
                title: "学习计划制定",
                tags: ["教育", "计划"],
                preview: "为我制定一个系统的学习计划...",
                content: "请为我制定一个30天的学习计划。\n\n学习信息：\n- 学习科目：\n- 当前水平：\n- 学习目标：\n- 每日可用时间：\n\n计划要求：\n1. 分阶段目标\n2. 具体学习资源\n3. 每日任务清单\n4. 评估方法"
            },
            {
                id: 5,
                title: "数据分析报告",
                tags: ["分析", "数据"],
                preview: "帮我分析数据并生成洞察...",
                content: "请帮我分析以下数据并生成商业洞察。\n\n数据信息：\n- 数据类型：\n- 数据范围：\n- 关键指标：\n- 业务背景：\n\n分析要求：\n1. 趋势分析\n2. 关键发现\n3. 潜在原因\n4. 优化建议"
            },
            {
                id: 6,
                title: "内容创意生成",
                tags: ["创意", "内容"],
                preview: "为我的内容生成创意想法...",
                content: "请为我生成5个创意内容想法。\n\n背景信息：\n- 内容类型：\n- 目标受众：\n- 品牌调性：\n- 核心消息：\n\n要求：\n1. 创意新颖\n2. 可执行性强\n3. 与品牌一致\n4. 包含内容形式建议"
            }
        ];
        
        let filteredPrompts = [...promptsData];
        let selectedTags = new Set();
        
        // 初始化
        function init() {
            renderTags();
            renderPrompts();
            setupEventListeners();
        }
        
        // 渲染标签过滤按钮
        function renderTags() {
            const allTags = new Set();
            promptsData.forEach(prompt => {
                prompt.tags.forEach(tag => allTags.add(tag));
            });
            
            const tagButtonsContainer = document.getElementById('tagButtons');
            tagButtonsContainer.innerHTML = '';
            
            // 添加"全部"按钮
            const allBtn = document.createElement('button');
            allBtn.textContent = '全部';
            allBtn.className = 'tag-btn active';
            allBtn.onclick = () => {
                selectedTags.clear();
                document.querySelectorAll('.tag-btn').forEach(btn => btn.classList.remove('active'));
                allBtn.classList.add('active');
                filterPrompts();
            };
            tagButtonsContainer.appendChild(allBtn);
            
            // 添加分类标签
            Array.from(allTags).sort().forEach(tag => {
                const btn = document.createElement('button');
                btn.textContent = tag;
                btn.className = 'tag-btn';
                btn.onclick = () => {
                    btn.classList.toggle('active');
                    if (btn.classList.contains('active')) {
                        selectedTags.add(tag);
                    } else {
                        selectedTags.delete(tag);
                    }
                    document.querySelector('.tag-btn:first-child').classList.remove('active');
                    filterPrompts();
                };
                tagButtonsContainer.appendChild(btn);
            });
        }
        
        // 渲染提示词卡片
        function renderPrompts() {
            const grid = document.getElementById('promptsGrid');
            const emptyState = document.getElementById('emptyState');
            
            if (filteredPrompts.length === 0) {
                grid.innerHTML = '';
                emptyState.style.display = 'block';
                return;
            }
            
            emptyState.style.display = 'none';
            grid.innerHTML = filteredPrompts.map(prompt => `
                <div class="prompt-card">
                    <div class="prompt-title">${prompt.title}</div>
                    <div class="prompt-tags">
                        ${prompt.tags.map(tag => `<span class="prompt-tag">${tag}</span>`).join('')}
                    </div>
                    <div class="prompt-preview">${prompt.preview}</div>
                    <div class="prompt-actions">
                        <button class="copy-btn" onclick="copyToClipboard('${prompt.id}')">
                            📋 复制
                        </button>
                        <button class="view-btn" onclick="showDetail(${prompt.id})">
                            👁️ 查看
                        </button>
                    </div>
                </div>
            `).join('');
        }
        
        // 复制到剪贴板
        function copyToClipboard(id) {
            const prompt = promptsData.find(p => p.id == id);
            const text = `${prompt.title}\n\n${prompt.content}`;
            
            navigator.clipboard.writeText(text).then(() => {
                showToast('✅ 已复制到剪贴板！');
            });
        }
        
        // 显示详情弹窗
        function showDetail(id) {
            const prompt = promptsData.find(p => p.id == id);
            document.getElementById('modalTitle').textContent = prompt.title;
            document.getElementById('modalBody').textContent = prompt.content;
            document.getElementById('detailModal').classList.add('active');
            
            document.getElementById('modalCopyBtn').onclick = () => {
                const text = `${prompt.title}\n\n${prompt.content}`;
                navigator.clipboard.writeText(text).then(() => {
                    showToast('✅ 已复制到剪贴板！');
                });
            };
        }
        
        // 关闭弹窗
        function closeModal() {
            document.getElementById('detailModal').classList.remove('active');
        }
        
        // 显示提示信息
        function showToast(message) {
            const toast = document.createElement('div');
            toast.className = 'toast';
            toast.textContent = message;
            document.body.appendChild(toast);
            
            setTimeout(() => {
                toast.remove();
            }, 2000);
        }
        
        // 过滤提示词
        function filterPrompts() {
            const searchTerm = document.getElementById('searchInput').value.toLowerCase();
            
            filteredPrompts = promptsData.filter(prompt => {
                const matchesSearch = 
                    prompt.title.toLowerCase().includes(searchTerm) ||
                    prompt.preview.toLowerCase().includes(searchTerm) ||
                    prompt.content.toLowerCase().includes(searchTerm);
                
                const matchesTags = selectedTags.size === 0 || 
                    prompt.tags.some(tag => selectedTags.has(tag));
                
                return matchesSearch && matchesTags;
            });
            
            renderPrompts();
        }
        
        // 绑定事件监听
        function setupEventListeners() {
            document.getElementById('searchInput').addEventListener('input', filterPrompts);
            document.getElementById('modalCloseBtn').addEventListener('click', closeModal);
            document.getElementById('detailModal').addEventListener('click', (e) => {
                if (e.target.id === 'detailModal') closeModal();
            });
        }
        
        // 启动应用
        init();
    </script>
</body>
</html>
